name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────
  # Backend – lint & build check
  # ────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx eslint src/ --no-error-on-unmatched-pattern || true
      - run: node -e "require('./src/app.js')" || true

  # ────────────────────────────────────────────
  # Dashboard – lint & build
  # ────────────────────────────────────────────
  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci
      - run: npx eslint . --no-error-on-unmatched-pattern || true
      - run: npm run build

  # ────────────────────────────────────────────
  # AI Service – lint & import check
  # ────────────────────────────────────────────
  ai-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-service/requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install ruff
      - run: ruff check . || true
      - run: python -c "from app import app; print('FastAPI app OK')"

  # ────────────────────────────────────────────
  # Docker – verify compose builds
  # ────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [backend, dashboard, ai-service]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
